spring.application.name=NumberGuessingGame

# ========= DB (example only) =========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/number_guessing_game
spring.datasource.username=example_user
spring.datasource.password=example_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# ========= JWT (example only) =========
# Must be at least 32 bytes.
jwt.secret=ExampleJwtSecretKeyMustBeAtLeast32BytesLong_1234567890
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Frontend origins for CORS (comma-separated, no trailing slash). Override deploy: APP_CORS_ALLOWED_ORIGINS
app.cors.allowed-origins=http://localhost:3000,https://example-frontend.com

# ========= VNPay (example only) =========
# Register your real TMN/hash-secret in VNPay merchant portal.
vnpay.tmn-code=EXAMPLE_TMN_CODE
vnpay.hash-secret=EXAMPLE_HASH_SECRET_32BYTES_MINIMUM_123456
vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.backend-public-base-url=http://localhost:8080
vnpay.frontend-base-url=http://localhost:3000
vnpay.pack-amount-vnd=10000
vnpay.pack-turns=5
